  <script>
    // Apply i18n after DOM ready (site.js already handles DOMContentLoaded,
    // but we also need to fill data-i18n in static HTML)
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = t(key);
        if (val) el.textContent = val;
      });
      // Hero links with lang
      document.querySelectorAll('[href="imoveis.html"]').forEach(a => a.href = pageUrl('imoveis.html'));
